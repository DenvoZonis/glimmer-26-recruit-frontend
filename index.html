<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微光成果展示</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        header h1 {
            font-size: 2.8rem;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-top: 12px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.6rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 24px;
            background: var(--accent);
            border-radius: 2px;
        }

        /* GitHub Projects Grid */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 60px;
        }

        .project-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
        }

        .project-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(56, 189, 248, 0.12);
            border-color: var(--accent);
        }

        .project-card .icon {
            font-size: 2rem;
            margin-bottom: 16px;
        }

        .project-card h3 {
            font-size: 1.15rem;
            margin-bottom: 8px;
        }

        .project-card .desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            flex: 1;
            margin-bottom: 16px;
        }

        .project-card .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 18px;
        }

        .project-card .tag {
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 20px;
            background: rgba(56, 189, 248, 0.12);
            color: var(--accent);
        }

        .project-card .link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--accent);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: gap 0.2s;
        }

        .project-card .link:hover { gap: 10px; }

        /* Video Section */
        .video-section {
            margin-bottom: 60px;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: #000;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            border-top: 1px solid var(--border);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        @media (max-width: 600px) {
            header { padding: 50px 16px 30px; }
            header h1 { font-size: 2rem; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>微光成果展示</h1>
        <p>我的 GitHub 项目 & Bilibili 视频分享</p>
    </header>

    <main class="container">

        <!-- GitHub 项目 -->
        <section>
            <h2 class="section-title">GitHub 项目</h2>
            <div class="projects-grid" id="projectsGrid">
                <!-- JS 动态填充 -->
            </div>
        </section>

        <!-- Bilibili 视频 -->
        <section class="video-section">
            <h2 class="section-title">Bilibili 视频</h2>
            <div class="video-wrapper">
                <iframe
                    src="https://player.bilibili.com/player.html?bvid=BV12yN264EwR&page=1&high_quality=1"
                    allowfullscreen
                    scrolling="no"
                    sandbox="allow-scripts allow-same-origin allow-popups"
                    loading="lazy">
                </iframe>
            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 个人作品展示 — 托管于 <a href="https://cloud.tencent.com" target="_blank" rel="noopener">腾讯云</a></p>
        <a href="https://beian.miit.gov.cn/" target="_blank">蜀ICP备2026040807号-1</a>
    </footer>

    <script>
        const projects = [
            {
                icon: "🌐",
                name: "hexo-theme-redefine",
                desc: "Fast, Pure, Elegant. Hexo, Redefined. 为其v2.9.0版本贡献代码。",
                tags: ["Hexo", "Theme"],
                url: "https://github.com/EvanNotFound/hexo-theme-redefine"
            },
            {
                icon: "🌟",
                name: "starlight-theme-md3",
                desc: "A beautiful, accessible, high-performance documentation website with Astro and Material Design. 为其贡献代码。",
                tags: ["Astro", "MaterialDesign"],
                url: "https://github.com/Axiaobo7788/starlight-material-design-theme"
            },
            {
                icon: "🤖",
                name: "java-kgcheckin",
                desc: "基于 develop202/kgcheckin 和 MakcRe/KuGouMusicApi 开发的 Java 版本，用于酷狗音乐自动签到领取 VIP，方便本地或 NAS 等方式运行。需使用Java 21或更高版本。",
                tags: ["Java", "KuGouMusic"],
                url: "https://github.com/DenvoZonis/java-kgcheckin"
            },
            {
                icon: "🛠️",
                name: "OpenCV-MinGW-Builds",
                desc: "The Builds of OpenCV with Windows and MinGW, support OpenCV version 4.12.0 and higher.",
                tags: ["OpenCV", "MinGW"],
                url: "https://github.com/DenvoZonis/OpenCV-MinGW-Builds"
            }
        ];

        const grid = document.getElementById('projectsGrid');

        projects.forEach(p => {
            const card = document.createElement('div');
            card.className = 'project-card';
            card.innerHTML = `
                <div class="icon">${p.icon}</div>
                <h3>${p.name}</h3>
                <p class="desc">${p.desc}</p>
                <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                <a class="link" href="${p.url}" target="_blank" rel="noopener">
                    查看项目 <span>→</span>
                </a>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
